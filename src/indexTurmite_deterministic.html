    <script>

        const pico8Palette = [
            { r: 255, g: 70, b: 0 },    // black
            { r: 169, g: 183, b: 223 },   // dark blue
            { r: 126, g: 37, b: 83 },   // dark purple
            { r: 0, g: 135, b: 81 },   // dark green
            { r: 171, g: 82, b: 54 },   // brown

        function seededRandom(seed) {
            // Create a simple LCG
            let state = seed;
            return function () {
                // Constants from a well-known LCG implementation
                state = (state * 1664525 + 1013904223) % 2147483648;
                return state / 2147483648;
            };
        }

        resizeCanvas();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'black';

        }

        class turmiteobj {
            constructor(turmite1, colorIndex) {
                this.posx = parseInt(turmite1.posy);
                this.posy = parseInt(turmite1.posx);
                this.rule = turmite1.rule;
                this.direction = turmite1.direction;
                this.state = turmite1.state;
                this.color = pico8Palette[colorIndex];
                this.gradient = 0;
                this.colorIndicator = this.getHighestChannel(this.color);


                /// temp slots
                this.newDirection = 0;
                this.colorOfField = 0;
            }


            getHighestChannel(color) {
                if (color.r >= color.g && color.r >= color.b) {
                    return 'r';
                } else if (color.g >= color.r && color.g >= color.b) {
                    return 'g';
                } else {
                    return 'b';
                }
            }


            getPixelColor(x, y, pixels) {
                const index = (y * canvas.width + x) * 4;
                return {
                    r: pixels[index],
                    g: pixels[index + 1],
                    b: pixels[index + 2],
                    a: pixels[index + 3]
                };
            }


            chooseDirection(pixels) {
                var stateOfField = this.getPixelColor(this.posx, this.posy, pixels)[this.colorIndicator];
                //console.log(stateOfField, this.state)
                if (stateOfField == 0 && this.state == 0) {
                    //0 0 change mirrow
                    this.colorOfField = this.rule[0] + this.rule[1];
                    this.newDirection = this.rule[2] + this.rule[3];
                    this.state = parseInt(this.rule[4] + this.rule[5]);

                    // change me back later pleease
                    // } else if (stateOfField == 255 && this.state == 0) {
                } else if (this.state == 0) {
                    //1 0
                    this.colorOfField = this.rule[6] + this.rule[7];
                    this.newDirection = this.rule[8] + this.rule[9];
                    this.state = parseInt(this.rule[10] + this.rule[11]);
                    //console.log("rule:2");
                } else if (stateOfField == 0 && this.state == 1) {
                    // 0 1
                    this.colorOfField = this.rule[12] + this.rule[13];
                    this.newDirection = this.rule[14] + this.rule[15];
                    this.state = parseInt(this.rule[16] + this.rule[17]);
                    //console.log("rule:3");
                    // change me back later pleease
                    // } else if (stateOfField == 255 && this.state == 1) {
                } else if (this.state == 1) {
                    //11
                    this.colorOfField = this.rule[18] + this.rule[19];
                    this.newDirection = this.rule[20] + this.rule[21];
                    this.state = parseInt(this.rule[22] + this.rule[23]);
                    //console.log("rule:4");
                }
            }


            changeDirection() {
                //change direction
                if (this.newDirection == "02") {
                    //console.log("changedirection:left")
                    this.direction = (this.direction + 1) % 4; // +
                } else if (this.newDirection == "08") {
                    //console.log("changedirection:right")
                    this.direction = (this.direction - 1) % 4; // -
                    if (this.direction < 0) {
                        this.direction = 3;
                    }
                } else if (this.newDirection == "04") {
                    //console.log("changedirection:uturn")
                    this.direction = (this.direction + 2) % 4;
                }
            }

            takeStep() {
                //console.log("_____")
                //console.log(this.direction)
                if (this.direction == 0) {
                    // 0 2 3 1
                    //console.log("move:left");
                    this.posy = (this.posy + 1) % 300;
                } else if (this.direction == 2) {
                    //console.log("move:right");
                    if (this.posy == 0) {
                        this.posy = 299;
                    } else {
                        this.posy = this.posy - 1;
                    }
                } else if (this.direction == 3) {
                    //console.log("move:up");
                    this.posx = (this.posx + 1) % 300;
                } else if (this.direction == 1) {
                    //console.log("move:down");
                    if (this.posx == 0) {
                        this.posx = 299;
                    } else {
                        this.posx = this.posx - 1;
                    }
                }
            }

            setSinglePixelColor(x, y, pixel, r, g, b, a) {
                const index = (y * canvas.width + x) * 4;
                pixel[index] = r;
                pixel[index + 1] = g;
                pixel[index + 2] = b;
                pixel[index + 3] = a;
                return pixel;
            }

            newSetField(pixels) {
                if (this.colorOfField == "ff") {
                    /// change me back later please
                    //return setSinglePixelColor(this.posx, this.posy, pixels, [40, 80, 150, 200, 250][Math.floor(this.gradient / 51.2)], 0, 0);
                    //return this.setSinglePixelColor(this.posx, this.posy, pixels, [40, 80, 150, 200, 250][Math.floor(this.gradient / 51.2)], 0, 0, 255);
                    return this.setSinglePixelColor(this.posx, this.posy, pixels, this.color["r"], this.color["g"], this.color["b"], [40, 80, 150, 200, 250][Math.floor(this.gradient / 51.2)])
                } else {
                    return this.setSinglePixelColor(this.posx, this.posy, pixels, 0, 0, 0, 0);
                }
            }

            step(pixels) {
                this.chooseDirection(pixels);
                const newPixels = this.newSetField(pixels);
                this.changeDirection();
                this.takeStep();
                this.gradient = (this.gradient + 1) % 256;
                return newPixels
            }
        }

        class PixelPusher {
            constructor(area, direction, steps) {
                this.steps = steps
                this.currentSteps = 0;
                this.direction = direction;
                // area is  {x1, y1, x2, y2}
                this.area = area;
            }


            shiftRectangleDownRight(pixel, canvasWidth) {
                const shiftedDown = this.shiftRectangleDown(pixel, canvasWidth);
                const shiftedDownRight = this.shiftRectangleRight(shiftedDown["pixels"], canvasWidth);
                return shiftedDownRight;
            }


            shiftRectangleDownLeft(pixel, canvasWidth) {
                const shiftedDown = this.shiftRectangleDown(pixel, canvasWidth);
                const shiftedDownLeft = this.shiftRectangleLeft(shiftedDown["pixels"], canvasWidth);
                return shiftedDownLeft;
            }


            shiftRectangleUpLeft(pixel, canvasWidth) {
                const shiftedUp = this.shiftRectangleUp(pixel, canvasWidth);
                const shiftedUpLeft = this.shiftRectangleLeft(shiftedUp["pixels"], canvasWidth);
                return shiftedUpLeft;
            }


            shiftRectangleUpRight(pixel, canvasWidth) {
                const shiftedUp = this.shiftRectangleUp(pixel, canvasWidth);
                const shiftedUpRight = this.shiftRectangleRight(shiftedUp["pixels"], canvasWidth);
                return shiftedUpRight;
            }



            shiftRectangleLeft(pixels, canvasWidth) {
                const newPixels = new Uint8ClampedArray(pixels);
                const startX = Math.min(this.area.x1, this.area.x2);
                const endX = Math.max(this.area.x1, this.area.x2);
                const startY = Math.min(this.area.y1, this.area.y2);
                const endY = Math.max(this.area.y1, this.area.y2);

                for (let y = startY; y < endY; y++) {
                    const rowStart = (y * canvasWidth + startX) * 4;
                    const temp = [
                        newPixels[rowStart],
                        newPixels[rowStart + 1],
                        newPixels[rowStart + 2],
                        newPixels[rowStart + 3]
                    ];

                    for (let x = startX; x < endX - 1; x++) {
                        const currentIndex = (y * canvasWidth + x) * 4;
                        const nextIndex = currentIndex + 4;
                        for (let i = 0; i < 4; i++) {
                            newPixels[currentIndex + i] = newPixels[nextIndex + i];
                        }
                    }

                    const lastIndex = (y * canvasWidth + endX - 1) * 4;
                    for (let i = 0; i < 4; i++) {
                        newPixels[lastIndex + i] = temp[i];
                    }
                }

                return { pixels: newPixels, width: canvasWidth, height: pixels.length / (4 * canvasWidth) };
            }

            shiftRectangleRight(pixels, canvasWidth) {
                const newPixels = new Uint8ClampedArray(pixels);
                const startX = Math.min(this.area.x1, this.area.x2);
                const endX = Math.max(this.area.x1, this.area.x2);
                const startY = Math.min(this.area.y1, this.area.y2);
                const endY = Math.max(this.area.y1, this.area.y2);

                for (let y = startY; y < endY; y++) {
                    // Save last pixel instead of first for right shift
                    const lastIndex = (y * canvasWidth + endX - 1) * 4;
                    const temp = [
                        newPixels[lastIndex],
                        newPixels[lastIndex + 1],
                        newPixels[lastIndex + 2],
                        newPixels[lastIndex + 3]
                    ];

                    for (let x = endX - 1; x > startX; x--) {
                        const currentIndex = (y * canvasWidth + x) * 4;
                        const prevIndex = currentIndex - 4;
                        for (let i = 0; i < 4; i++) {
                            newPixels[currentIndex + i] = newPixels[prevIndex + i];
                        }
                    }

                    // Put saved pixel at start
                    const firstIndex = (y * canvasWidth + startX) * 4;
                    for (let i = 0; i < 4; i++) {
                        newPixels[firstIndex + i] = temp[i];
                    }
                }

                return { pixels: newPixels, width: canvasWidth, height: pixels.length / (4 * canvasWidth) };
            }

            shiftRectangleUp(pixels, canvasWidth) {
                const newPixels = new Uint8ClampedArray(pixels);
                const startX = Math.min(this.area.x1, this.area.x2);
                const endX = Math.max(this.area.x1, this.area.x2);
                const startY = Math.min(this.area.y1, this.area.y2);
                const endY = Math.max(this.area.y1, this.area.y2);

                for (let x = startX; x < endX; x++) {
                    const colStart = (startY * canvasWidth + x) * 4;
                    const temp = [
                        newPixels[colStart],
                        newPixels[colStart + 1],
                        newPixels[colStart + 2],
                        newPixels[colStart + 3]
                    ];

                    for (let y = startY; y < endY - 1; y++) {
                        const currentIndex = (y * canvasWidth + x) * 4;
                        const nextIndex = ((y + 1) * canvasWidth + x) * 4;
                        for (let i = 0; i < 4; i++) {
                            newPixels[currentIndex + i] = newPixels[nextIndex + i];
                        }
                    }

                    const lastIndex = ((endY - 1) * canvasWidth + x) * 4;
                    for (let i = 0; i < 4; i++) {
                        newPixels[lastIndex + i] = temp[i];
                    }
                }

                return { pixels: newPixels, width: canvasWidth, height: pixels.length / (4 * canvasWidth) };
            }

            shiftRectangleDown(pixels, canvasWidth) {
                const newPixels = new Uint8ClampedArray(pixels);
                const startX = Math.min(this.area.x1, this.area.x2);
                const endX = Math.max(this.area.x1, this.area.x2);
                const startY = Math.min(this.area.y1, this.area.y2);
                const endY = Math.max(this.area.y1, this.area.y2);

                for (let x = startX; x < endX; x++) {
                    // Save bottom pixel instead of top for down shift
                    const bottomIndex = ((endY - 1) * canvasWidth + x) * 4;
                    const temp = [
                        newPixels[bottomIndex],
                        newPixels[bottomIndex + 1],
                        newPixels[bottomIndex + 2],
                        newPixels[bottomIndex + 3]
                    ];

                    for (let y = endY - 1; y > startY; y--) {
                        const currentIndex = (y * canvasWidth + x) * 4;
                        const prevIndex = ((y - 1) * canvasWidth + x) * 4;
                        for (let i = 0; i < 4; i++) {
                            newPixels[currentIndex + i] = newPixels[prevIndex + i];
                        }
                    }

                    // Put saved pixel at top
                    const topIndex = (startY * canvasWidth + x) * 4;
                    for (let i = 0; i < 4; i++) {
                        newPixels[topIndex + i] = temp[i];
                    }
                }

                return { pixels: newPixels, width: canvasWidth, height: pixels.length / (4 * canvasWidth) };
            }


            shift(pixels, canvasWidth) {
                this.currentSteps = this.currentSteps + 1;
                switch (this.direction) {
                    case 'left': return this.shiftRectangleLeft(pixels, canvasWidth);
                    case 'right': return this.shiftRectangleRight(pixels, canvasWidth);
                    case 'up': return this.shiftRectangleUp(pixels, canvasWidth);
                    case 'down': return this.shiftRectangleDown(pixels, canvasWidth);
                    case 'downRight': return this.shiftRectangleDownRight(pixels, canvasWidth);
                    case 'downLeft': return this.shiftRectangleDownLeft(pixels, canvasWidth);
                    case 'upRight': return this.shiftRectangleUpRight(pixels, canvasWidth);
                    case 'upLeft': return this.shiftRectangleUpLeft(pixels, canvasWidth);

                    default: return this.shiftRectangleLeft(pixels, canvasWidth);
                }
            }
        }



        function getRectangleIndices(canvasWidth, x1, y1, x2, y2) {
            const startX = Math.min(x1, x2);
            const endX = Math.max(x1, x2);
            const startY = Math.min(y1, y2);
            const endY = Math.max(y1, y2);

            // Returns array of indices that make up the rectangle
            const indices = [];

            for (let y = startY; y < endY; y++) {
                for (let x = startX; x < endX; x++) {
                    const index = (y * canvasWidth + x) * 4;
                    indices.push(index); // R index
                }
            }

            return indices;
        }

        function generateRandomRectangles(canvas, count, minSize = 2, maxSize = 60) {
            const rectangles = [];

            for (let i = 0; i < count; i++) {
                // Generate random starting point
                const x1 = Math.floor(costomRandom() * (canvas.width - maxSize));
                const y1 = Math.floor(costomRandom() * (canvas.height - maxSize));

                // Generate random width and height between min and max size
                const width = Math.floor(costomRandom() * (maxSize - minSize)) + minSize;
                const height = Math.floor(costomRandom() * (maxSize - minSize)) + minSize;

                // Ensure we don't exceed canvas bounds
                const x2 = Math.min(x1 + width, canvas.width);
                const y2 = Math.min(y1 + height, canvas.height);

                rectangles.push({
                    x1,
                    y1,
                    x2,
                    y2
                });
            }

            return rectangles;
        }

        /// svg convert function here

        function redBlackCanvasToSVG(canvas) {
            const width = canvas.width;
            const height = canvas.height;

            // Create SVG element with black background
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

            // Add black background
            const background = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            background.setAttribute('width', width);
            background.setAttribute('height', height);
            background.setAttribute('x', 0);
            background.setAttribute('y', 0);
            background.setAttribute('fill', 'black');
            svg.appendChild(background);

            // Get canvas image data
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            // Check for red pixels and add them to SVG
            // Red is roughly (255, 0, 0) in RGB
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 4;
                    const r = data[index];
                    const g = data[index + 1];
                    const b = data[index + 2];

                    // Check if pixel is red (allowing some tolerance)
                    if (r > 0) {
                        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rect.setAttribute('x', x);
                        rect.setAttribute('y', y);
                        rect.setAttribute('width', 1);
                        rect.setAttribute('height', 1);
                        rect.setAttribute('fill', `rgb(${r}, ${g}, ${b})`);
                        svg.appendChild(rect);
                    }
                }
            }

            // Convert SVG to string
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svg);

            return svgString;
        }


        function fullColorCanvasToSVG(canvas) {
            const width = canvas.width;
            const height = canvas.height;

            // Create SVG element with black background
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', width);
            svg.setAttribute('height', height);
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

            // Add black background
            const background = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            background.setAttribute('width', width);
            background.setAttribute('height', height);
            background.setAttribute('x', 0);
            background.setAttribute('y', 0);
            background.setAttribute('fill', 'black');
            svg.appendChild(background);

            // Get canvas image data
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            // Export all pixels with their actual colors (including alpha channel)
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 4;
                    const r = data[index];
                    const g = data[index + 1];
                    const b = data[index + 2];
                    const a = data[index + 3];

                    // Check if pixel has any color or alpha value (not completely transparent black)
                    if (r > 0 || g > 0 || b > 0 || a > 0) {
                        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rect.setAttribute('x', x);
                        rect.setAttribute('y', y);
                        rect.setAttribute('width', 1);
                        rect.setAttribute('height', 1);

                        // Include alpha channel in the color
                        if (a < 255) {
                            rect.setAttribute('fill', `rgba(${r}, ${g}, ${b}, ${a / 255})`);
                        } else {
                            rect.setAttribute('fill', `rgb(${r}, ${g}, ${b})`);
                        }

                        svg.appendChild(rect);
                    }
                }
            }

            // Convert SVG to string
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svg);

            return svgString;
        }


        function exportAndDownloadSVG(canvas, writefunction) {
            const svgString = writefunction(canvas);

            // Create a Blob from the SVG string
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);

            // Create a temporary link element
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            downloadLink.download = 'cipher.svg'; // Name of the downloaded file
            downloadLink.style.display = 'none';     // Hide the link
            document.body.appendChild(downloadLink);

            // Trigger download and clean up
            downloadLink.click();

            // Clean up: remove link and revoke object URL after download starts
            setTimeout(() => {
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(url);
            }, 100);
        }

                step++;

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let currentPixels = imageData.data;

                // Turmite updates more frequently
                if (step % FRAMES_PER_TURMITE_UPDATE === 0) {
                    turmites.forEach(turmite => {
                        currentPixels = turmite.step(currentPixels);
                    })
                    lastTurmiteUpdate = step;
                }

                // Pixel pushers update less frequently
                if (step % FRAMES_PER_PUSHER_UPDATE === 0) {
                    pixelPusher = pixelPusher.filter(pusher => {
                        return pusher.currentSteps < pusher.steps;
                    });

                    if (pixelPusher.length == 0) {
                        var listofSelections = generateRandomRectangles(canvas, RECTANGLE_PUSHER_NUMBER);
                        var choice = ["up", "down", "left", "right", "downRight", "downLeft", "upLeft", "upRight"];
                        var choice2 = [2, 20, 30, 40]; //2, 20, 30, 40

                        listofSelections.forEach(rect => {
                            // You can create a PixelPusher for each rectangle
                            const pusher = new PixelPusher(rect, choice[Math.floor(costomRandom() * choice.length)], choice2[Math.floor(costomRandom() * choice2.length)]);
                            pixelPusher.push(pusher)
                        });
                    }
                    pixelPusher.forEach(pusher => {
                        const result = pusher.shift(currentPixels, canvas.width);
                        currentPixels = result.pixels;
                    });
                    lastPusherUpdate = step;
                }


                imageData.data.set(currentPixels);
                ctx.putImageData(imageData, 0, 0);

                if (step % FRAMES_PER_CLEANER_UPDATE === 0) {
                    newcleaner.step(currentPixels);
                    lastCleanerUpdate = step;

                }

            }

            async function runAnimation() {
                while (true) {
                    animate();
                    //16
                    await new Promise(resolve => setTimeout(resolve, 10));
                }
            }

            runAnimation();

        }

        // const crawler = ["ff0000ff0801000000000200", "ff0000ff0801000201000000", "ff0000ff0801000201000200", "ff0000ff0801ff0400000200", "ff0001000200000200000200", "ff0001000200000200ff0000", "ff0001000801ff0000ff0200", "ff0001ff0201ff0000ff0800"]

        // var allturmites = [];

        // 2. In buildStart function, modify to:
        const buildStart = () => {
            // Make sure coordinates are properly set
            if (!config.coordinates || !config.coordinates.length || config.coordinates.length < 20) {
                console.log("Missing coordinates, cannot start animation");
                return;
            }

            // Derive seed from coordinates for deterministic but unique-per-token randomness
            const derivedSeed = (config.coordinates[0].x * 256 + config.coordinates[0].y) * 31337;
            costomRandom = seededRandom(derivedSeed);
            console.log("Using derived seed:", derivedSeed);

            // Make sure turmite rules are provided
            if (!config.builderTurmites || !config.builderTurmites.length ||
                !config.walkerTurmites || !config.walkerTurmites.length) {
                console.log("Missing turmite rules, cannot start animation");

            }

            // Now proceed with the animation
            var allturmites = [];

            // Create turmites without defaults
            // Use config.color (0-15) for turmite color
            const turmiteColor = config.color !== null ? config.color : 0;

            for (var a = 0; a < 15; a++) {
                var gene = config.builderTurmites[a % config.builderTurmites.length];
                const turmiteData = {
                    posx: config.coordinates[a].x + 22,
                    posy: config.coordinates[a].y + 22,
                    rule: gene,
                    state: 0,
                    direction: 1
                };
                const turmiteobjNew = new turmiteobj(turmiteData, turmiteColor);
                allturmites.push(turmiteobjNew);
            }

            for (var b = 15; b < 20; b++) {
                var gene = config.walkerTurmites[b % config.walkerTurmites.length];
                const turmiteData = {
                    posx: config.coordinates[b].x + 22,
                    posy: config.coordinates[b].y + 22,
                    rule: gene,
                    state: 0,
                    direction: 1
                };
                const turmiteobjNew = new turmiteobj(turmiteData, turmiteColor);
                allturmites.push(turmiteobjNew);
            }

            // Extract animation parameters: chaosNumbers = [pusherSlowness, cleanerSlowness, rectangleCount]
            const pusherFrames = config.chaosNumbers[0] === 0 ? 11 : config.chaosNumbers[0];
            const cleanerFrames = config.chaosNumbers[1] === 0 ? 1 : config.chaosNumbers[1];
            const rectangleCount = config.chaosNumbers[2] === 0 ? 30 : config.chaosNumbers[2];

            main(allturmites, pusherFrames, cleanerFrames, rectangleCount);
        }

        // Listen for messages from the parent window
        window.addEventListener('message', (event) => {
            console.log('Iframe received message:', event.data);
            // You might want to check event.origin for security
            if (event.data.type === 'UPDATE_ANIMATION' && event.data.data) {
                // Update the configuration
                Object.assign(config, event.data.data);
                console.log('Config updated:', config);
                // Restart the animation with new values
                buildStart();
            }

            // ADD THIS NEW CASE:
            if (event.data.type === 'EXPORT_SVG') {
                console.log('Export SVG requested');
                const svgString = redBlackCanvasToSVG(canvas);

                // Send SVG data back to parent

                    type: 'SVG_READY',

                }, '*');
